<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patient Registration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    .renderly-doc { background: #fff; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .field { margin-top: 18px; }
    label { font-weight: 600; display: block; margin-bottom: 4px; }
    input[type=text], input[type=number], input[type=date] {
      border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px;
      width: 100%; font-size: 14px; margin-top: 2px;
    }
    input[type=text]:focus, input[type=number]:focus, input[type=date]:focus {
      outline: none; border-color: #0055cc; box-shadow: 0 0 0 3px rgba(0,85,204,.15);
    }
    fieldset.choice-group { border: none; padding: 0; margin: 18px 0 0; }
    fieldset.choice-group legend { font-weight: 600; font-size: 14px; margin-bottom: 8px; padding: 0; }
    .choice-option { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: 6px; cursor: pointer; font-weight: 400; margin-top: 4px; }
    .choice-option:hover { background: #f0f4ff; }
    .choice-option input[type=radio], .choice-option input[type=checkbox] {
      width: 16px; height: 16px; cursor: pointer; accent-color: #0055cc; flex-shrink: 0;
    }
    button { margin-top: 24px; background: #0055cc; color: #fff; border: none;
      padding: 10px 24px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0044aa; }
    h1,h2,h3 { margin-top: 0; }
    .field-errors { color: #cc2200; font-size: 13px; margin: 4px 0 0; padding-left: 16px; }
    [data-intent=muted] { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div class="renderly-doc">
<h1 data-size="lg">Patient Registration</h1><div data-direction="row" data-gap="md"><div class="field" id="field-first_name"><label for="first_name">First Name</label><input type="text" id="first_name" name="first_name" required placeholder="Jane" /></div><div class="field" id="field-last_name"><label for="last_name">Last Name</label><input type="text" id="last_name" name="last_name" required placeholder="Smith" /></div></div><div class="field" id="field-dob"><label for="dob">Date of Birth</label><input type="date" id="dob" name="dob" required /></div><fieldset class="field choice-group" id="field-gender"><legend>Gender</legend><label class="choice-option"><input type="radio" id="gender-m" name="gender" value="m" />Male</label><label class="choice-option"><input type="radio" id="gender-f" name="gender" value="f" checked />Female</label><label class="choice-option"><input type="radio" id="gender-o" name="gender" value="o" />Other / Prefer not to say</label></fieldset><div class="field" id="field-guardian_name"><label for="guardian_name">Guardian Name</label><input type="text" id="guardian_name" name="guardian_name" placeholder="Guardian&#x27;s full name" /></div><div class="field" id="field-age"><label for="age">Age</label><input type="number" id="age" name="age" min="0" max="120" /></div><p id="bmi" data-weight="normal" data-intent="default">BMI: 22.857</p><p data-weight="normal" data-intent="muted">By submitting you agree to our terms.</p><button type="submit" id="submit_btn" data-route="/api/patients">Register Patient</button>
  </div>
</body>
</html>
